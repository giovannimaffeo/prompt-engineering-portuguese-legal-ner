Desse modo , não pode decorrer de mero exercício interpretativo levado a efeito por titular de órgão de escalão inferior do <span class="organizacao">Ministério da Previdência Social</span> , tal como ressaltado pelo <span class="pessoa">Ministro Joaquim Barbosa</span> , em situação análoga à presente ( <span class="jurisprudencia">ACO 702/CE</span> ) .
